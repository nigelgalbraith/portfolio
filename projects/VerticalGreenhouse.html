<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nigel Galbraith - Vertical Greenhouse</title>

  <!-- CSS -->
  <link href="../styles/style.css" rel="stylesheet"/>

  <!-- Simple inline favicon -->
  <link rel="icon" href="../images/favicon/optimized/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon/optimized/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon/optimized/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../images/favicon/optimized/favicon-180x180.png">

  <!-- JSON-style data -->
  <script src="../js/JSON/mainTextData.js"></script>
  <script src="../js/JSON/iconRegistry.js"></script>
  <script src="js/JSON/ReflectionsTextData.js"></script>
  <script src="js/JSON/carouselData.js"></script>
  <script src="js/JSON/sketchfabModels.js"></script>

  <!-- JavaScript Functionality -->
  <script src="../js/themeToggle.js" defer></script>
  <script src="js/modalZoom.js" defer></script>
  <script src="js/init.js" defer></script>
  <script src="../js/footerIconLoader.js" defer></script>
  <script src="../js/skillsLoader.js" defer></script>
  <script src="js/carousel.js" defer></script>
  <script src="js/embedSketchfab.js" defer></script>
  <script src="../js/mainTextLoader.js" defer></script>
  <script src="js/ReflectionsLoader.js" defer></script>
  <script src="../js/responsiveImageLoader.js" defer></script>

  <!-- 3D model viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>


<body>
  <!-- 
    Dynamic Content Notes:
    - Responsive image is inserted using data-img-name via ../js/responsiveImageLoader.js
    - Footer content (contact icons, branding) is injected via ../js/footerIconLoader.js
    - Tools and Key Learnings icons are populated using data-icons via ../js/skillsLoader.js
    - Modal image zoom enabled via js/modalZoom.js
    - Main project text paragraphs injected via ../js/mainTextLoader.js
    - Relections text paragraphs loaded into .reflections-content-text from ../js/ReflectionsLoader.js based on data-project
  -->

  <div class="grid-bg"></div>
  <div class="container">
    <h1>Nigel Galbraith Portfolio</h1>

  <!-- Theme toggle button -->
  <div class="theme-toggle-wrapper">
    <button
      class="theme-toggle"
      type="button"
      aria-label="Toggle light/dark mode"
      aria-pressed="false"
      title="Toggle light/dark mode">
      <span class="theme-toggle-icon" aria-hidden="true">☾</span>
      <span class="theme-toggle-text">Theme</span>
    </button>
  </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
      <ul>
        <li><a href="../projects.html">Back To Projects</a></li>
      </ul>
    </nav>

    <!-- Main Page Content -->
    <main class="main-content">
      <div class="main-content-flex-centre">
        <h2>Vertical Greenhouse</h2>

        <!-- Carousel using responsive <picture> injection -->
        <div class="boxed-content-main-image">
          <div class="image-zoom-wrapper">
            <div class="carousel-container" data-carousel="verticalGreenhouseCarousel">
              <div class="carousel-slide"></div>
              <div class="dots"></div>
            </div>
          </div>
        </div>

        <!-- Modal Zoom -->
        <div class="modal" id="imgModal" onclick="closeFullScreen()">
          <span class="close">×</span>
          <img class="modal-content" id="fullImg"/>
        </div>

        <!-- Main Text Section (injected dynamically from js/mainTextLoader.js) -->
        <div class="main-content-text" data-main-text="verticalGreenhouse"></div>

        <!-- 3D Model Viewer using Sketchfab -->
        <h2 class="centered-title">3D Model Viewer</h2>
        <div class="boxed-content">
          <div data-sketchfab-embed="verticalGreenhouse"></div>
        </div>

        <!-- Image Carousel -->
        <h2 class="centered-title">Project Images</h2>
        <div class="boxed-content">
          <div class="image-zoom-wrapper">
            <div class="carousel-container" data-carousel="verticalGreenhouseSketchupCarousel">
              <div class="carousel-slide"></div>
              <div class="dots"></div>
            </div>
          </div>
        </div>

        <div class="step-separator"></div>

        <!-- Relections Page Text (paragraphs etc injected dynamically) -->
        <div class="reflections-content-text" data-reflections-text="verticalGreenhouse"></div>

        <div class="step-separator"></div>
        
        <!-- Download Links -->
        <div class="boxed-content">
          <div data-sketchfab-links="verticalGreenhouse"></div>
        </div>

        <!-- Tools and Technologies -->
        <h2 class="centered-title">Tools and Technologies</h2>
        <div class="boxed-content">
          <div class="icon-grid" data-icons="woodwork, tools, SketchUp"></div>
        </div>

        <!-- Key Learnings -->
        <h2 class="centered-title">Key Learnings</h2>
        <div class="boxed-content">
          <div class="icon-grid" data-icons="problem_solving, ThreeD_Design"></div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer></footer>
  </div>
</body>
</html>
